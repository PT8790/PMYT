  .tl-item { position: relative; padding: 6px 0 14px; }

}; // end SCREENS

let currentRole = "guest";
let currentScreen = "guest/home";

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  const nav = NAV[currentRole];
  let html = "";
  for (const grp of nav) {
    html += `<h4>${grp.group}</h4>`;
    for (const it of grp.items) {
      const active = it.key === currentScreen ? "active" : "";
      html += `<a class="nav-item ${active}" data-key="${it.key}">${it.label}</a>`;
    }
  }
  sidebar.innerHTML = html;
  sidebar.querySelectorAll(".nav-item[data-key]").forEach(el => {
    el.addEventListener("click", () => {
      currentScreen = el.dataset.key;
      renderSidebar();
      renderMain();
    });
  });
}

function renderMain() {
  const main = document.getElementById("main");
  const fn = SCREENS[currentScreen];
  if (fn) {
    main.innerHTML = fn();
  } else {
    main.innerHTML = `<div class="card"><div class="card-title">Màn hình "${currentScreen}"</div><div class="placeholder">[ Wireframe đang được phát triển ]</div></div>`;
  }
  window.scrollTo(0, 0);
}

function renderUserInfo() {
  const u = ROLE_USER[currentRole];
  document.getElementById("userName").textContent = u.name;
  document.getElementById("avatar").textContent = u.avatar;
  document.getElementById("roleRibbon").textContent = u.ribbon;
}

function setRole(role) {
  currentRole = role;
  currentScreen = NAV[role][0].items[0].key;
  document.querySelectorAll(".role-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.role === role);
  });
  renderUserInfo();
  renderSidebar();
  renderMain();
}

document.getElementById("roleSwitcher").addEventListener("click", (e) => {
  if (e.target.matches(".role-btn")) {
    setRole(e.target.dataset.role);
  }
});

setRole("guest");
</script>
