  body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; background: #f3f4f6; color: #1f2937; font-size: 13px; line-height: 1.45; }
  .topbar { display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 2px solid #111; padding: 10px 18px; position: sticky; top: 0; z-index: 100; }
  .logo { font-weight: 700; font-size: 14px; letter-spacing: .3px; }
  .logo small { color: #6b7280; font-weight: 400; margin-left: 6px; }
  .role-switcher { display: flex; gap: 6px; }
  .role-btn { border: 1px solid #111; background: #fff; padding: 7px 14px; cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 2px; }
  .role-btn.active { background: #111; color: #fff; }
  .user-chip { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .avatar { width: 28px; height: 28px; border: 1px solid #999; border-radius: 50%; background: #e5e7eb; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
  .layout { display: flex; min-height: calc(100vh - 50px); }
  .sidebar { width: 240px; background: #fff; border-right: 1px solid #d1d5db; padding: 14px 0; overflow-y: auto; max-height: calc(100vh - 50px); position: sticky; top: 50px; }
  .sidebar h4 { padding: 10px 18px 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; }
  .nav-item { display: block; padding: 8px 18px; color: #1f2937; text-decoration: none; cursor: pointer; border-left: 3px solid transparent; font-size: 13px; }
  .nav-item:hover { background: #f9fafb; }
  .nav-item.active { background: #f3f4f6; border-left-color: #111; font-weight: 600; }
  .main { flex: 1; padding: 22px 28px; overflow-y: auto; }
  .breadcrumb { font-size: 11px; color: #6b7280; margin-bottom: 8px; }
  .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; border-bottom: 2px dashed #111; padding-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .page-sub { font-size: 12px; color: #6b7280; margin-bottom: 18px; }
  .card { background: #fff; border: 1px dashed #9ca3af; padding: 16px; margin-bottom: 16px; border-radius: 2px; }
  .card-title { font-weight: 600; font-size: 13px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px dashed #d1d5db; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .col { flex: 1 1 0; min-width: 200px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { background: #fff; border: 1px dashed #9ca3af; padding: 14px; text-align: center; border-radius: 2px; }
  .stat-num { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; }
  .field label .req { color: #b91c1c; }
  .input, .select, .textarea { width: 100%; border: 1px solid #9ca3af; background: #fafafa; padding: 8px 10px; font-family: inherit; font-size: 13px; border-radius: 2px; }
  .textarea { min-height: 80px; resize: vertical; }
  .btn { display: inline-block; border: 1px solid #111; background: #fff; padding: 7px 14px; font-size: 12px; cursor: pointer; font-weight: 500; border-radius: 2px; }
  .btn:hover { background: #f3f4f6; }
  .btn.primary { background: #111; color: #fff; }
  .btn.primary:hover { background: #333; }
  .btn.danger { border-color: #b91c1c; color: #b91c1c; }
  .btn.sm { padding: 4px 9px; font-size: 11px; }
  .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  table.wf { width: 100%; border-collapse: collapse; background: #fff; }
  table.wf th, table.wf td { border: 1px solid #d1d5db; padding: 7px 9px; text-align: left; font-size: 12px; vertical-align: top; }
  table.wf th { background: #f9fafb; font-weight: 600; }
  table.wf tr:hover { background: #fafafa; }

  .badge.draft { border-color: #6b7280; color: #374151; }
  .badge.sent { border-color: #2563eb; color: #2563eb; }
  .badge.review { border-color: #d97706; color: #d97706; }
  .badge.approved { border-color: #15803d; color: #15803d; }
  .badge.rejected { border-color: #b91c1c; color: #b91c1c; }
  .badge.done { border-color: #15803d; color: #15803d; background: #f0fdf4; }

  .tabs { display: flex; gap: 0; border-bottom: 1px solid #d1d5db; margin-bottom: 14px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; border: 1px solid #d1d5db; border-bottom: none; background: #f3f4f6; cursor: pointer; font-size: 12px; font-weight: 500; }
  .tab.active { background: #fff; font-weight: 700; border-bottom: 1px solid #fff; margin-bottom: -1px; }
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ""; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 2px; background: #d1d5db; }
  .tl-item { position: relative; padding: 6px 0 14px; }
  .tl-item::before { content: ""; position: absolute; left: -19px; top: 10px; width: 10px; height: 10px; border: 2px solid #111; background: #fff; border-radius: 50%; }
  .tl-item.done::before { background: #111; }
  .tl-title { font-weight: 600; font-size: 12px; }
  .tl-meta { color: #6b7280; font-size: 11px; }
  .notif { padding: 10px 12px; border: 1px solid #d1d5db; border-left: 4px solid #111; margin-bottom: 8px; background: #fff; }
  .notif-title { font-weight: 600; font-size: 12px; }
  .notif-meta { color: #6b7280; font-size: 11px; margin-top: 2px; }

  .banner-label { font-size: 11px; text-transform: uppercase; color: #6b7280; letter-spacing: .5px; font-weight: 600; }
  .banner-title { font-size: 18px; font-weight: 700; color: #111; margin: 2px 0; }
  .banner-meta { font-size: 12px; color: #374151; }
  .banner-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .phase-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 14px; }
  .phase-step { padding: 8px 6px; border: 1px solid #d1d5db; border-radius: 3px; text-align: center; font-size: 11px; background: #fafafa; position: relative; }
  .phase-step.done { background: #dcfce7; border-color: #15803d; color: #166534; }
  .phase-step.current { background: #fef08a; border-color: #d97706; color: #854d0e; font-weight: 700; box-shadow: 0 0 0 2px rgba(217,119,6,0.25); }
  .phase-step .step-num { font-size: 14px; font-weight: 700; display: block; }
  .phase-block { border: 1px solid #d1d5db; border-radius: 4px; margin-bottom: 10px; overflow: hidden; }
  .phase-header { background: #f9fafb; padding: 8px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #e5e7eb; font-weight: 600; font-size: 13px; cursor: pointer; }
  .phase-header.done { background: #f0fdf4; border-bottom-color: #bbf7d0; }
  .phase-header.current { background: #fef9c3; border-bottom-color: #fde68a; }
  .phase-header.skipped { background: #f3f4f6; color: #6b7280; }
  .phase-num { font-size: 16px; font-weight: 700; color: #2563eb; min-width: 24px; }
  .phase-name { flex: 1; }
  .phase-body { padding: 4px 14px 6px; background: #fff; }
  .state-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px dashed #e5e7eb; }
  .state-row:last-child { border-bottom: none; }
  .state-id { width: 38px; font-weight: 700; font-size: 11px; color: #6b7280; text-align: center; padding: 3px 4px; background: #f3f4f6; border-radius: 3px; flex-shrink: 0; }
  .state-row.done .state-id { background: #dcfce7; color: #166534; }
  .state-row.current .state-id { background: #fef08a; color: #854d0e; box-shadow: 0 0 0 2px rgba(217,119,6,0.35); }
  .state-row.blocked .state-id { background: #fee2e2; color: #991b1b; }
  .state-row.optional .state-id { background: #e0e7ff; color: #3730a3; }
  .state-info { flex: 1; min-width: 0; }
  .state-title { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .state-row.current .state-title::after { content: "◀ Đang ở đây"; color: #d97706; font-size: 11px; font-weight: 700; padding: 1px 6px; background: #fef08a; border-radius: 3px; }
  .state-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .state-actor { font-size: 11px; color: #2563eb; }
  .state-action { display: flex; gap: 4px; flex-shrink: 0; }
  .state-icon { font-size: 14px; width: 18px; text-align: center; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .search-bar .input { flex: 1; min-width: 200px; }
  .role-ribbon { font-size: 10px; padding: 2px 8px; background: #111; color: #fff; border-radius: 2px; letter-spacing: 1px; }
  .footer-hint { padding: 16px; font-size: 11px; color: #9ca3af; text-align: center; }
  .mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
  .mb-0 { margin-bottom: 0; } .mb-8 { margin-bottom: 8px; }
  .text-muted { color: #6b7280; }
  .text-right { text-align: right; }
  .small { font-size: 11px; }
  .divider { border: none; border-top: 1px dashed #d1d5db; margin: 14px 0; }
</style>
</head>

}; // end SCREENS

let currentRole = "guest";
let currentScreen = "guest/home";

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  const nav = NAV[currentRole];
  let html = "";
  for (const grp of nav) {
    html += `<h4>${grp.group}</h4>`;
    for (const it of grp.items) {
      const active = it.key === currentScreen ? "active" : "";
      html += `<a class="nav-item ${active}" data-key="${it.key}">${it.label}</a>`;
    }
  }
  sidebar.innerHTML = html;
  sidebar.querySelectorAll(".nav-item[data-key]").forEach(el => {
    el.addEventListener("click", () => {
      currentScreen = el.dataset.key;
      renderSidebar();
      renderMain();
    });
  });
}

function renderMain() {
  const main = document.getElementById("main");
  const fn = SCREENS[currentScreen];
  if (fn) {
    main.innerHTML = fn();
  } else {
    main.innerHTML = `<div class="card"><div class="card-title">Màn hình "${currentScreen}"</div><div class="placeholder">[ Wireframe đang được phát triển ]</div></div>`;
  }
  window.scrollTo(0, 0);
}

function renderUserInfo() {
  const u = ROLE_USER[currentRole];
  document.getElementById("userName").textContent = u.name;
  document.getElementById("avatar").textContent = u.avatar;
  document.getElementById("roleRibbon").textContent = u.ribbon;
}

function setRole(role) {
  currentRole = role;
  currentScreen = NAV[role][0].items[0].key;
  document.querySelectorAll(".role-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.role === role);
  });
  renderUserInfo();
  renderSidebar();
  renderMain();
}

document.getElementById("roleSwitcher").addEventListener("click", (e) => {
  if (e.target.matches(".role-btn")) {
    setRole(e.target.dataset.role);
  }
});

setRole("guest");
</script>
</body>
</html>
